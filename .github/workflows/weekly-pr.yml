name: Weekly Summary PR

on:
  schedule:
    # Sunday at 23:00 UTC — open a summary PR
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  weekly-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate weekly summary
        id: summary
        run: |
          WEEK=$(date -u +%Y-W%V)
          BRANCH="weekly-summary-${WEEK}"
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "week=${WEEK}" >> $GITHUB_OUTPUT

          git config user.name "King-Austin"
          git config user.email "nworahebuka.a@gmail.com"
          git checkout -b $BRANCH

          # Count activity this week
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)
          TIL_COUNT=$(ls til/ 2>/dev/null | grep -c "^${SINCE:0:7}" || echo 0)
          ALGO_COUNT=$(ls algos/ 2>/dev/null | grep -c "^${SINCE:0:7}" || echo 0)
          LOG_COUNT=$(ls devlog/ 2>/dev/null | grep -c "^${SINCE:0:7}" || echo 0)

          mkdir -p summaries

          cat > "summaries/week-${WEEK}.md" << EOF
# Weekly Summary — ${WEEK}

_Generated $(date -u +"%Y-%m-%d %H:%M UTC")_

## Activity This Week

| Type | Count |
|------|-------|
| TIL entries | ${TIL_COUNT} |
| Algorithm snippets | ${ALGO_COUNT} |
| Dev log entries | ${LOG_COUNT} |

## Recent TIL Entries

$(ls til/ 2>/dev/null | tail -5 | sed 's/^/- /')

## Recent Algorithms

$(ls algos/ 2>/dev/null | tail -5 | sed 's/^/- /')
EOF
          git add -A
          git commit -m "docs: weekly summary ${WEEK}"
          git push origin $BRANCH

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Weekly summary ${{ steps.summary.outputs.week }}" \
            --body "Auto-generated weekly activity summary. Covers TIL entries, algorithm snippets, and dev log updates from the past 7 days." \
            --base main \
            --head "${{ steps.summary.outputs.branch }}" \
            --label "automated"

  auto-merge:
    needs: weekly-pr
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Merge the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK=$(date -u +%Y-W%V)
          PR=$(gh pr list --head "weekly-summary-${WEEK}" --json number --jq '.[0].number')
          if [ -n "$PR" ]; then
            gh pr merge $PR --merge --delete-branch
          fi
